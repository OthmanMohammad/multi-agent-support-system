version: '3.8'

# =============================================================================
# ENTERPRISE-GRADE DOCKER COMPOSE STACK
# Multi-Agent Support System with Celery Background Processing
#
# NEW ADDITIONS:
# - Celery Worker (background task processing)
# - Celery Beat (scheduled tasks)
# - Flower (Celery monitoring UI)
# - Optimized build caching with BuildKit
# - Better health checks
# - Improved logging
# =============================================================================

x-common-env: &common-env
  # Environment
  ENVIRONMENT: ${ENVIRONMENT:-production}

  # Database
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}

  # Redis
  REDIS_ENABLED: ${REDIS_ENABLED:-true}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

  # Celery
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}

  # Anthropic API
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

  # Modal.com (GPU)
  MODAL_WEB_URL: ${MODAL_WEB_URL:-}
  MODAL_TOKEN_ID: ${MODAL_TOKEN_ID:-}
  MODAL_TOKEN_SECRET: ${MODAL_TOKEN_SECRET:-}

  # Qdrant
  QDRANT_URL: ${QDRANT_URL:-}
  QDRANT_API_KEY: ${QDRANT_API_KEY:-}

  # JWT
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}

  # CORS
  API_CORS_ORIGINS: ${API_CORS_ORIGINS:-["http://localhost:3000"]}

  # Sentry
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}

  # Logging
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_FORMAT: ${LOG_FORMAT:-json}

services:
  # ===========================================================================
  # APPLICATION LAYER
  # ===========================================================================

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: runtime
      args:
        PYTHON_VERSION: 3.11
      cache_from:
        - ghcr.io/othmanmohammad/backend:latest
    image: ghcr.io/othmanmohammad/backend:${VERSION:-latest}
    container_name: multi-agent-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data:ro
      - huggingface-cache:/app/.cache/huggingface:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8000"
      - "prometheus.path=/metrics"

  # ===========================================================================
  # CELERY WORKERS (Background Task Processing)
  # ===========================================================================

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: runtime
      args:
        PYTHON_VERSION: 3.11
    image: ghcr.io/othmanmohammad/backend:${VERSION:-latest}
    container_name: multi-agent-celery-worker
    restart: unless-stopped
    command: celery -A src.celery.celery_app worker --loglevel=info --concurrency=4 -Q default,high_priority,low_priority
    environment:
      <<: *common-env
      # Celery-specific
      C_FORCE_ROOT: "true"
    volumes:
      - ./logs/celery:/app/logs
      - ./data:/app/data:ro
      - huggingface-cache:/app/.cache/huggingface:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.celery.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=9090"
      - "prometheus.path=/metrics"

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: runtime
      args:
        PYTHON_VERSION: 3.11
    image: ghcr.io/othmanmohammad/backend:${VERSION:-latest}
    container_name: multi-agent-celery-beat
    restart: unless-stopped
    command: celery -A src.celery.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      <<: *common-env
    volumes:
      - ./logs/celery:/app/logs
      - celery-beat-schedule:/tmp
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  flower:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: runtime
      args:
        PYTHON_VERSION: 3.11
    image: ghcr.io/othmanmohammad/backend:${VERSION:-latest}
    container_name: multi-agent-flower
    restart: unless-stopped
    command: celery -A src.celery.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "5555:5555"
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ===========================================================================
  # DATABASE LAYER
  # ===========================================================================

  postgres:
    image: postgres:15-alpine
    container_name: multi-agent-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-support_agent}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deployment/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./backups:/backups
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-support_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 6G
        reservations:
          cpus: '1'
          memory: 3G
    shm_size: 256mb

  redis:
    image: redis:7-alpine
    container_name: multi-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes
    volumes:
      - redis-data:/data
      - ./deployment/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ===========================================================================
  # REVERSE PROXY & SSL
  # ===========================================================================

  nginx:
    image: nginx:1.25-alpine
    container_name: multi-agent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deployment/nginx/ssl:/etc/nginx/ssl:ro
      - ./deployment/certbot/www:/var/www/certbot:ro
      - ./deployment/certbot/conf:/etc/letsencrypt:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - fastapi
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  certbot:
    image: certbot/certbot:latest
    container_name: multi-agent-certbot
    volumes:
      - ./deployment/certbot/www:/var/www/certbot
      - ./deployment/certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app-network

  # ===========================================================================
  # MONITORING LAYER
  # ===========================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: multi-agent-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployment/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  grafana:
    image: grafana/grafana:latest
    container_name: multi-agent-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_INSTALL_PLUGINS: ${GRAFANA_INSTALL_PLUGINS:-}
      GF_AUTH_ANONYMOUS_ENABLED: false
      GF_ANALYTICS_REPORTING_ENABLED: false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployment/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # ===========================================================================
  # EXPORTERS (Metrics Collection)
  # ===========================================================================

  node-exporter:
    image: prom/node-exporter:latest
    container_name: multi-agent-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: multi-agent-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-support_agent}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: multi-agent-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  celery-beat-schedule:
    driver: local
  huggingface-cache:
    driver: local
